<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title.login.ja}"></title>
	
	<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

	<!-- カスタム CSS・JS -->
	<link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body>
    <div class="card">
        <h3 th:text="#{title.login.ja}"></h3>
        <form th:action="@{/todo/login}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="mb-3 input-group">
                <i class="fa fa-user form-icon"></i>
                <input type="text" class="form-control" name="username" placeholder="ユーザー名" required>
            </div>
            <div class="mb-3 input-group">
                <i class="fa fa-lock form-icon"></i>
                <input type="password" class="form-control" name="password" placeholder="パスワード" required>
            </div>
            <div class="d-grid">
                <button th:text="#{btn.login.ja}" type="submit" class="btn btn-primary"></button>
            </div>
        </form>
        <div class="text-link">
            <p>アカウントがない方は <a th:text="#{btn.new.register.ja}" th:href="@{/todo/register}"></a></p>
        </div>
    </div>
</body>
</html>
