<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title.page.ja}"></title>
	
	<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

	<!-- カスタム CSS・JS -->
	<link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body>
    <div class="card">
        <h3 th:text="#{title.register.ja}"></h3>
        <form th:action="@{/todo/register}" th:object="${registerForm}" method="post">

			<div class="mb-3">
			  <input type="text" th:field="*{name}" class="form-control" placeholder="名前"
			         th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
			  
			  <ul class="invalid-feedback-list" th:if="${#fields.hasErrors('name')}">
			    <li th:each="err : ${#fields.errors('name')}" th:text="${err}"></li>
			  </ul>
			</div>
			<div class="mb-3">
			  <input type="text" th:field="*{userName}" class="form-control" placeholder="ユーザー名"
			         th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
			  
			  <ul class="invalid-feedback-list" th:if="${#fields.hasErrors('userName')}">
			    <li th:each="err : ${#fields.errors('userName')}" th:text="${err}"></li>
			  </ul>
			</div>
			<div class="mb-3">
			  <input type="password" th:field="*{password}" class="form-control" placeholder="パスワード"
			         th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
			  
			  <ul class="invalid-feedback-list" th:if="${#fields.hasErrors('password')}">
			    <li th:each="err : ${#fields.errors('password')}" th:text="${err}"></li>
			  </ul>
			</div>
            <div class="d-grid">
                <button th:text="#{btn.register.ja}" type="submit" class="btn btn-success"></button>
            </div>
        </form>
        <div class="text-link">
            <p>アカウントをお持ちの方は <a th:text="#{btn.login.ja}" th:href="@{/todo/login}"></a></p>
        </div>
    </div>
</body>
</html>
