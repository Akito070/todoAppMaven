<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title th:text="#{items.add.todo.ja}"></title>
	<!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
	
	<!-- カスタム CSS・JS -->
	<link th:href="@{/css/todo_form.css}" rel="stylesheet">
</head>
<body>
	<div class="form-card">
	    <h3 th:text="#{items.add.todo.ja}"></h3>
	    <form th:action="@{/todo/create}" th:object="${todoRegisterForm}" method="post">
	        <div class="mb-3">
	            <label th:text="#{items.title.ja}" for="title" class="form-label"></label>
				<input type="text" th:field="*{title}" class="form-control"  placeholder="例：商品登録"
				       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
				<div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
	        </div>
	        <div class="mb-3">
	            <label th:text="#{items.description.ja}" for="description" class="form-label"></label>
				<textarea th:field="*{description}" class="form-control"  rows="8"  placeholder="例：2月入荷の商品のページを作成"
				       th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
				<div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
			 </div>
			 <div class="mb-3">
			   <label th:text="#{items.category.ja}" for="categoryId" class="form-label"></label>
			   <!--カテゴリープルダウン-->
			   <select th:field="*{categoryId}"
			           th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid'"
			           class="form-select form-select-sm">
			     <option value="">カテゴリーを選択</option>
			     <option th:each="category : ${categories}"
			             th:value="${category.id}"
			             th:text="${category.name}">
			     </option>
			   </select>
			   <div class="invalid-feedback" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
			 </div>
			 <!--追加ボタン-->
	        <div class="d-grid">
	            <button type="submit" class="btn btn-primary btn-rounded">
	                <i th:text="#{btn.add.ja}" class="fas fa-plus-circle"></i> 
	            </button>
	        </div>
	    </form>
		<!--一覧に戻るボタン-->
	    <div class="text-center mt-3">
	        <a th:href="@{/todo/todoList}" class="text-decoration-none">
	            <i th:text="#{link.back.list}" class="fas fa-chevron-left"></i> 
	        </a>
	    </div>
	</div>
</body>
</html>
